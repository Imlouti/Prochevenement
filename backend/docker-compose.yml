services:
  mongo:
    image: mongo:7
    container_name: prochevement-db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - prochevement-net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  backend:
    build: ./
    container_name: prochevement-backend
    ports:
      - "5000:5000"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - prochevement-net
    environment:
      - MONGO_URI=mongodb://mongo:27017/prochevement
      - PORT=5000
      - GMAIL_USER=prochevenement@gmail.com
      - GMAIL_PASS=cnvd gpun oupu pdbu
      - JWT_SECRET=69a2cd4a6c187f4f3ac9e3aefe802a9f18a4af8355af8f62a0f093f7b122ba22b2e8c9f82d21658393590582e5e18881afac5ec7529d2ba6324f922585c92913

networks:
  prochevement-net:
    driver: bridge

volumes:
  mongo_data:
