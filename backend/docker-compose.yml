services:
  mongo:
    image: mongo:7
    container_name: prochevement-db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./
    container_name: prochevement-backend
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    environment:
      - MONGO_URI=mongodb://mongo:27017/prochevement
      - PORT=5000

volumes:
  mongo_data: